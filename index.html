<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus - Expense Tracker</title>
    <link rel="icon" type="image/png" href="icon.png">
    <link rel="stylesheet" href="styles.css?v=3">
</head>
<body>
    <div class="bg-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>
    <div class="container">
        <header class="header">
            <div style="display: flex; align-items: center; gap: var(--spacing-3);">
                <img src="icon.png" alt="Nexus Logo" class="app-logo">
                <h1>Nexus</h1>
            </div>
            <div>
                <button class="btn btn-icon" id="btn-settings" aria-label="Settings">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
                </button>
            </div>
        </header>

        <main>
            <!-- Dashboard -->
            <section class="summary-grid">
                <div class="summary-card">
                    <div class="summary-label">Income (This Month)</div>
                    <div class="summary-value text-success" id="summary-income">₹0.00</div>
                </div>
                <div class="summary-card">
                    <div class="summary-label">Expenses (This Month)</div>
                    <div class="summary-value text-error" id="summary-expense">₹0.00</div>
                </div>
                <div class="summary-card">
                    <div class="summary-label">Net Total</div>
                    <div class="summary-value" id="summary-net">₹0.00</div>
                </div>
            </section>
            
            <section class="card hidden" id="budget-section">
                <div class="summary-label" style="display: flex; justify-content: space-between;">
                    <span>Monthly Budget</span>
                    <span id="budget-text">₹0.00 / ₹1000.00</span>
                </div>
                <div class="progress-container">
                    <div class="progress-bar" id="budget-progress" style="width: 0%"></div>
                </div>
            </section>

            <section class="card hidden" id="chart-section">
                <div class="summary-label">Expense Trend</div>
                <div style="width: 100%; height: 200px; position: relative; margin-top: var(--spacing-2);">
                    <canvas id="expense-chart"></canvas>
                </div>
            </section>

            <!-- Transactions -->
            <section>
                <div class="header" style="border:none; padding-bottom: 0;">
                    <h2>Transactions</h2>
                </div>
                
                <div class="filters-bar">
                    <input type="text" id="filter-search" class="form-control" placeholder="Search notes or category...">
                    <select id="filter-type" class="form-control">
                        <option value="all">All Types</option>
                        <option value="expense">Expense</option>
                        <option value="income">Income</option>
                    </select>
                    <select id="filter-month" class="form-control">
                        <option value="all">All Time</option>
                        <!-- Populated dynamically -->
                    </select>
                </div>

                <div id="transaction-list-container" class="transaction-list">
                    <!-- Transactions go here -->
                </div>
            </section>
        </main>
    </div>

    <!-- Floating Action Button -->
    <button class="fab" id="btn-add" aria-label="Add Transaction">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
    </button>

    <!-- Transaction Modal -->
    <div class="modal-overlay" id="modal-transaction" aria-hidden="true">
        <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
            <div class="modal-header">
                <h3 id="modal-title">Add Transaction</h3>
                <button class="btn-icon" id="btn-close-modal" aria-label="Close">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                </button>
            </div>
            <div class="modal-body">
                <form id="transaction-form">
                    <input type="hidden" id="tx-id">
                    <div class="form-group">
                        <label for="tx-type">Type</label>
                        <select id="tx-type" class="form-control" required>
                            <option value="expense">Expense</option>
                            <option value="income">Income</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="tx-amount">Amount</label>
                        <input type="number" id="tx-amount" class="form-control" step="0.01" min="0.01" required>
                    </div>
                    <div class="form-group">
                        <label for="tx-category">Category</label>
                        <input type="text" id="tx-category" class="form-control" list="category-list" required>
                        <datalist id="category-list">
                            <option value="Food">
                            <option value="Transport">
                            <option value="Utilities">
                            <option value="Entertainment">
                            <option value="Salary">
                            <option value="Shopping">
                        </datalist>
                    </div>
                    <div class="form-group">
                        <label for="tx-date">Date</label>
                        <input type="date" id="tx-date" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label for="tx-note">Note (Optional)</label>
                        <input type="text" id="tx-note" class="form-control">
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" id="btn-cancel-modal">Cancel</button>
                <button type="submit" class="btn btn-primary" form="transaction-form">Save</button>
            </div>
        </div>
    </div>

    <!-- Settings Modal -->
    <div class="modal-overlay" id="modal-settings" aria-hidden="true">
        <div class="modal" role="dialog" aria-modal="true" aria-labelledby="settings-title">
            <div class="modal-header">
                <h3 id="settings-title">Settings & Data</h3>
                <button class="btn-icon" id="btn-close-settings" aria-label="Close">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                </button>
            </div>
            <div class="modal-body">
                <form id="settings-form">
                    <div class="form-group">
                        <label for="set-currency">Currency Symbol</label>
                        <input type="text" id="set-currency" class="form-control" maxlength="5">
                    </div>
                    <div class="form-group">
                        <label for="set-budget">Monthly Budget (Optional)</label>
                        <input type="number" id="set-budget" class="form-control" step="1" min="0">
                    </div>
                    
                    <h4 style="margin: var(--spacing-4) 0 var(--spacing-2);">Data Management</h4>
                    <div style="display: flex; gap: var(--spacing-2); flex-wrap: wrap;">
                        <button type="button" class="btn btn-secondary" id="btn-export-json">Export JSON</button>
                        <button type="button" class="btn btn-secondary" id="btn-export-csv">Export CSV</button>
                        <label class="btn btn-secondary" style="margin: 0; cursor: pointer;">
                            Import JSON
                            <input type="file" id="input-import" accept=".json" class="hidden">
                        </label>
                    </div>
                    <div style="margin-top: var(--spacing-3);">
                        <button type="button" class="btn btn-secondary" style="color: var(--color-error); border-color: var(--color-error);" id="btn-reset-data">Reset All Data</button>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" id="btn-cancel-settings">Cancel</button>
                <button type="submit" class="btn btn-primary" form="settings-form">Save Settings</button>
            </div>
        </div>
    </div>

    <div class="toast-container" id="toast-container"></div>

    <script src="utils.js"></script>
    <script src="storage.js"></script>
    <script src="app.js"></script>
</body>
</html>
